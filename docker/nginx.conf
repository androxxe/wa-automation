server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ─── SPA fallback ─────────────────────────────────────────────────────────
    # Serve static files directly; fall back to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;

        # No-cache on HTML (hashed assets keep default caching)
        location ~* \.html$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }
    }

    # ─── API proxy ────────────────────────────────────────────────────────────
    # Forward all /api/* requests to the Express API service
    location /api/ {
        proxy_pass http://api:3001;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE (Server-Sent Events) support
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        chunked_transfer_encoding off;

        # Increase timeouts for long-running SSE connections
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ─── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
}
