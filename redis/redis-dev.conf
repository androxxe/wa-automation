# ─── Dev Redis config ─────────────────────────────────────────────────────────
# Runs on port 6379 to stay separate from the prod instance on 6380.

port 6379

# Store data inside the project so it is self-contained
dir /Users/andriopratama/Projects/whatsapp-automation/redis/data-dev

# ─── AOF persistence ──────────────────────────────────────────────────────────
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# ─── Snapshotting (RDB) ───────────────────────────────────────────────────────
save 3600 1
save 300 100
save 60 10000

# ─── Logging ──────────────────────────────────────────────────────────────────
loglevel notice
logfile ""
