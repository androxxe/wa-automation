# ─── Project-local Redis config ───────────────────────────────────────────────
# Runs on port 6380 to avoid conflicting with any global Redis on 6379.

port 6380

# Store data inside the project so it is self-contained
dir /Users/andriopratama/Projects/whatsapp-automation/redis/data

# ─── AOF persistence ──────────────────────────────────────────────────────────
# Writes every command to an append-only log so BullMQ jobs survive a restart.
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# ─── Snapshotting (RDB) ───────────────────────────────────────────────────────
# Secondary safety net — save a full snapshot periodically.
save 3600 1
save 300 100
save 60 10000

# ─── Logging ──────────────────────────────────────────────────────────────────
loglevel notice
logfile ""
